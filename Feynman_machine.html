<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>מכונת פיינמן אינטראקטיבית</title>
<style>
body { margin:0; font-family: Arial; direction: rtl; }
.container { display:flex; }
canvas { border:1px solid #ccc; }
.instructions { padding:10px; background:#f5f5f5; }
</style>
</head>
<body>

<div class="instructions">
<p>
ציירו מסלול בין שתי הנקודות על ידי לחיצה וגרירה מהנקודה הכחולה לנקודה האדומה.<br>
המערכת תציג את ההסתברות השקולה.
</p>
</div>

<div class="container">
<canvas id="leftCanvas" width="600" height="500"></canvas>
<canvas id="rightCanvas" width="600" height="500"></canvas>
</div>

<script>
const A = {x:50, y:250};
const B = {x:550, y:250};
const startThreshold = 20;

const left = document.getElementById('leftCanvas');
const right = document.getElementById('rightCanvas');
const ctx1 = left.getContext('2d');
const ctx2 = right.getContext('2d');

let drawing = false;
let tempPath = [];
let paths = [];
let zSum = {re:0, im:0};

function drawPoints(){
    ctx1.fillStyle='blue';
    ctx1.beginPath(); ctx1.arc(A.x,A.y,8,0,Math.PI*2); ctx1.fill();
    ctx1.fillStyle='red';
    ctx1.beginPath(); ctx1.arc(B.x,B.y,8,0,Math.PI*2); ctx1.fill();
}

function placeholder(){
    ctx1.setLineDash([5,5]);
    ctx1.strokeStyle='green';
    ctx1.beginPath();
    for(let i=0;i<=20;i++){
        let t=i/20;
        let x=A.x+(B.x-A.x)*t;
        let y=A.y-50*Math.sin(Math.PI*t);
        if(i===0) ctx1.moveTo(x,y);
        else ctx1.lineTo(x,y);
    }
    ctx1.stroke();
    ctx1.setLineDash([]);
    ctx1.fillStyle='green';
    ctx1.fillText('ציירו מסלול בין שתי הנקודות',200,100);
}

function redraw(){
    ctx1.clearRect(0,0,left.width,left.height);
    drawPoints();

    paths.forEach(function(obj){
        var p = obj.path;

        ctx1.strokeStyle='blue';
        ctx1.beginPath();
        p.forEach(function(pt,i){
            if(i===0) ctx1.moveTo(pt.x,pt.y);
            else ctx1.lineTo(pt.x,pt.y);
        });
        ctx1.stroke();

        ctx1.fillStyle='magenta';
        ctx1.fillText(obj.prob.toFixed(2), obj.mid.x, obj.mid.y);
    });
}

left.onmousedown = (e)=>{
    let rect = left.getBoundingClientRect();
    let x=e.clientX-rect.left;
    let y=e.clientY-rect.top;
    let dist = Math.hypot(x-A.x,y-A.y);
    if(dist<startThreshold){
        drawing=true;
        tempPath=[A];
    }
};

left.onmousemove = (e)=>{
    if(!drawing) return;
    let rect = left.getBoundingClientRect();
    let x=e.clientX-rect.left;
    let y=e.clientY-rect.top;
    tempPath.push({x,y});

    redraw();
    ctx1.strokeStyle='green';
    ctx1.beginPath();
    tempPath.forEach(function(pt,i){
        if(i===0) ctx1.moveTo(pt.x,pt.y);
        else ctx1.lineTo(pt.x,pt.y);
    });
    ctx1.stroke();
};

left.onmouseup = ()=>{
    if(!drawing || tempPath.length<2) return;
    drawing=false;

    tempPath.push(B);
    let result = compute(tempPath);
    paths.push(result);
    redraw();
};

function compute(path){
    let avgDist=0;
    for(let i=0;i<path.length;i++){
        let t=i/(path.length-1);
        let cx=A.x+(B.x-A.x)*t;
        let cy=A.y+(B.y-A.y)*t;
        avgDist+=Math.hypot(path[i].x-cx,path[i].y-cy);
    }
    avgDist/=path.length;

    let pathLen=0;
    for(let i=1;i<path.length;i++){
        pathLen+=Math.hypot(path[i].x-path[i-1].x,path[i].y-path[i-1].y);
    }
    let straight=Math.hypot(B.x-A.x,B.y-A.y);
    let tort=pathLen/straight;
    let penalty=Math.exp(-0.6*Math.pow(Math.max(0,tort-1),2));

    // התאמת קנה מידה (פיקסלים → יחידות כמו במאטלב)
    let scaledDist = avgDist / 50;
    let prob=Math.exp(-0.05*scaledDist*scaledDist)*penalty;
    prob=Math.min(prob,1);

    let mid=path[Math.floor(path.length/2)];

    let z={re:Math.cos(avgDist), im:Math.sin(avgDist)};
    zSum.re+=z.re;
    zSum.im+=z.im;

    drawVectors(z);

    return {path:path, prob:prob, mid:mid};
}

function drawVectors(z){
    ctx2.clearRect(0,0,right.width,right.height);

    // נשמור את כל הווקטורים
    if(!window.allVectors) window.allVectors = [];
    window.allVectors.push(z);

    const originX = 300;
    const originY = 250;

    // פונקציה לציור חץ
    function drawArrow(x1,y1,x2,y2,color,width=1.5){
        const headlen = 10;
        const dx = x2 - x1;
        const dy = y2 - y1;
        const angle = Math.atan2(dy, dx);

        ctx2.strokeStyle = color;
        ctx2.lineWidth = width;
        ctx2.beginPath();
        ctx2.moveTo(x1,y1);
        ctx2.lineTo(x2,y2);
        ctx2.stroke();

        ctx2.beginPath();
        ctx2.moveTo(x2, y2);
        ctx2.lineTo(x2 - headlen * Math.cos(angle - Math.PI/6), y2 - headlen * Math.sin(angle - Math.PI/6));
        ctx2.lineTo(x2 - headlen * Math.cos(angle + Math.PI/6), y2 - headlen * Math.sin(angle + Math.PI/6));
        ctx2.lineTo(x2, y2);
        ctx2.fillStyle = color;
        ctx2.fill();
    }

    // ציור כל הווקטורים הקודמים
    ctx2.strokeStyle='blue';
    window.allVectors.forEach(function(v){
        drawArrow(originX, originY, originX + v.re*100, originY - v.im*100, 'blue', 1);
    });

    // ציור הווקטור החדש (מודגש)
    drawArrow(originX, originY, originX + z.re*100, originY - z.im*100, 'blue', 2);

    // וקטור שקול
    let norm=Math.hypot(zSum.re,zSum.im);
    let sx=zSum.re/norm;
    let sy=zSum.im/norm;

    drawArrow(originX, originY, originX + sx*120, originY - sy*120, 'black', 2.5);

    // תיקון כיוון זוויות (היפוך ציר Y של canvas)
    let thetaNew=Math.atan2(-z.im,z.re)*180/Math.PI;
    let thetaSum=Math.atan2(-zSum.im,zSum.re)*180/Math.PI;

    // נרמול ל-0-360
    if(thetaNew < 0) thetaNew += 360;
    if(thetaSum < 0) thetaSum += 360;

    ctx2.fillStyle='black';
    ctx2.fillText('θ חדש = ' + thetaNew.toFixed(1) + '°',330,50);
    ctx2.fillText('θ שקול = ' + thetaSum.toFixed(1) + '°',330,75);
}

// init
placeholder();
drawPoints();
</script>

</body>
</html>
